      #     sed -i \
      #       -e "s|<AWS_ACCOUNT_ID>|${{ vars.AWS_ACCOUNT_ID }}|g" \
      #       -e "s|<AWS_REGION>|${{ vars.AWS_REGION }}|g" \
      #       taskdef.json

      # Render task definition con la imagen recién subida.
      # La action escribe el JSON renderizado en un archivo de nombre aleatorio
      # en /tmp/ (ej. /tmp/task-definition-abc123.json). Lo copiamos a un nombre
      # estable para que el job de deploy pueda referenciarlo.
